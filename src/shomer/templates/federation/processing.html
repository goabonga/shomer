{% extends "base.html" %}
{% block title %}Signing in — Shomer{% endblock %}
{% block content %}
<h1>Signing in...</h1>
{% if error %}
<p class="error">{{ error }}</p>
<p><a href="/ui/login">Back to login</a></p>
{% else %}
<p>Please wait while we complete your sign-in.</p>
<div class="spinner"></div>
{% endif %}

<style>
    .spinner { width: 40px; height: 40px; margin: 24px auto; border: 4px solid #eee; border-top-color: #333; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
{% endblock %}
