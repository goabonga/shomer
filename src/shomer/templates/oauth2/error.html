{% extends "base.html" %}
{% block title %}Error — Shomer{% endblock %}
{% block content %}
<h1>Authorization Error</h1>

<p class="text-muted mt-1">{{ friendly_message }}</p>

<div class="card mt-2">
    <p><strong>Error:</strong> <code class="mono">{{ error }}</code></p>
    <p class="mt-1"><strong>Description:</strong> {{ error_description }}</p>
</div>

<div class="mt-2" style="text-align:center">
    <a href="/" class="btn btn-secondary">Back to Home</a>
</div>
{% endblock %}
