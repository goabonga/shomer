<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shomer{% endblock %}</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 400px; margin: 60px auto; padding: 0 16px; }
        h1 { text-align: center; }
        form { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: #c00; }
        .success { color: #060; }
        a { color: #333; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
