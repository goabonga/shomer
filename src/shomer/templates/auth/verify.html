{% extends "base.html" %}
{% block title %}Verify Email — Shomer{% endblock %}
{% block content %}
<h1>Verify Email</h1>
{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
{% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}
<form method="post" action="/ui/verify">
    <input type="email" name="email" placeholder="Email" value="{{ email or '' }}" required>
    <input type="text" name="code" placeholder="6-digit code" required maxlength="6" pattern="[0-9]{6}">
    <button type="submit">Verify</button>
</form>
<form method="post" action="/ui/verify/resend" class="mt-2">
    <input type="hidden" name="email" value="{{ email or '' }}">
    <button type="submit" class="btn btn-secondary">Resend Code</button>
</form>
{% endblock %}
