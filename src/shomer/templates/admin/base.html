<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin — Shomer{% endblock %}</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/shomer.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <input type="checkbox" id="hamburger-toggle" class="hamburger-toggle">
    <header class="mobile-header">
        <h2>Shomer Admin</h2>
        <label for="hamburger-toggle" class="hamburger-btn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </label>
    </header>
    <label for="hamburger-toggle" class="menu-overlay"></label>

    <div class="layout">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>Shomer</h2>
                <span>Administration</span>
            </div>
            <div class="sidebar-nav">
                <a href="/ui/admin" class="{% if section == 'dashboard' %}active{% endif %}">Dashboard</a>
                <div class="section-title">Management</div>
                <a href="/ui/admin/users" class="{% if section == 'users' %}active{% endif %}">Users</a>
                <a href="/ui/admin/clients" class="{% if section == 'clients' %}active{% endif %}">OAuth2 Clients</a>
                <a href="/ui/admin/sessions" class="{% if section == 'sessions' %}active{% endif %}">Sessions</a>
                <a href="/ui/admin/pats" class="{% if section == 'pats' %}active{% endif %}">PATs</a>
                <div class="section-title">Configuration</div>
                <a href="/ui/admin/roles" class="{% if section == 'roles' %}active{% endif %}">Roles & Scopes</a>
                <a href="/ui/admin/tenants" class="{% if section == 'tenants' %}active{% endif %}">Tenants</a>
                <a href="/ui/admin/jwks" class="{% if section == 'jwks' %}active{% endif %}">Signing Keys</a>
                <div class="nav-separator"></div>
                <a href="/ui/settings/profile">My Profile</a>
                <a href="/ui/logout">Logout</a>
            </div>
        </nav>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
