services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
      - CREDENTIALS_DIRECTORY=/run/secrets
      - SHOMER_DATABASE_HOST=postgres
      - SHOMER_DATABASE_USER=shomer
      - SHOMER_DATABASE_NAME=shomer
      - SHOMER_REDIS_HOST=redis
    secrets:
      - DATABASE_PASSWORD
      - REDIS_PASSWORD
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readiness')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - CREDENTIALS_DIRECTORY=/run/secrets
      - SHOMER_REDIS_HOST=redis
    secrets:
      - REDIS_PASSWORD
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A shomer.worker beat --loglevel=info
    environment:
      - CREDENTIALS_DIRECTORY=/run/secrets
      - SHOMER_REDIS_HOST=redis
    secrets:
      - REDIS_PASSWORD
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.server
    command: alembic upgrade head
    environment:
      - PYTHONPATH=/app/src
      - CREDENTIALS_DIRECTORY=/run/secrets
      - SHOMER_DATABASE_HOST=postgres
      - SHOMER_DATABASE_USER=shomer
      - SHOMER_DATABASE_NAME=shomer
    secrets:
      - DATABASE_PASSWORD
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=shomer
      - POSTGRES_PASSWORD_FILE=/run/secrets/DATABASE_PASSWORD
      - POSTGRES_DB=shomer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    secrets:
      - DATABASE_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shomer"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    command: >
      sh -c 'if [ -f /run/secrets/REDIS_PASSWORD ]; then
        redis-server --requirepass "$$(cat /run/secrets/REDIS_PASSWORD)"
      else
        redis-server
      fi'
    ports:
      - "6379:6379"
    secrets:
      - REDIS_PASSWORD
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "shomer", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

secrets:
  DATABASE_PASSWORD:
    file: ./docker-compose-database-secret.txt
  REDIS_PASSWORD:
    file: ./docker-compose-redis-secret.txt

volumes:
  pgdata:
